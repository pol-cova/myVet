version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "18080:18080"
    environment:
      - JWT_SECRET=change-this-to-a-secure-secret-key-in-production
    volumes:
      - db-data:/app/core
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  db-data:
